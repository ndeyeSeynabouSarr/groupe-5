<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - UCAB Agricole</title>
    <link rel="stylesheet" href="connexion.css">
</head>
<body>

<div class="login-container">

    <img src="./images/logo.jpeg" alt="Logo UCAB Agricole" class="logo">

    <h2>Connexion à votre compte</h2>

    <form>
        <label>Adresse e-mail</label>
        <input type="email" placeholder="Entrez votre adresse e-mail" required>

        <label>Mot de passe</label>
        <input type="password" placeholder="Entrez votre mot de passe" required>

        <div class="remember">
            <input type="checkbox">
            <span>Se souvenir de moi</span>
        </div>

        <button type="submit">Se connecter</button>

        <a href="#">Mot de passe oublié ?</a>

        <p>Vous n'avez pas de compte ? <a href="#">Créer un compte</a></p>
    </form>

</div>

</body>
</html>
